# 港电统一平台 · nginx 参考配置(多实例无 sticky,09 §二 G / 06-E13)
# 要点:round-robin 不加 ip_hash(会话在 Redis,任一实例可服务);
#       HTTPS 强制(Secure Cookie 依赖,禁用关 Secure"修"登录);
#       client_max_body_size 与应用层限制一致(06-E11);
#       登录口网关限速 6r/m 与应用层锁定双层互补(H03 §2)。
# Copyright (c) 2026 厦门自贸片区港务电力有限公司(港电实验室)

worker_processes auto;

events { worker_connections 1024; }

http {
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=6r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;

    upstream idp_pool {
        server idp-1:9000;
        server idp-2:9000;
        # 无 ip_hash:会话与登录上下文均不依赖实例亲和(06-E13)
    }

    upstream certvault_pool {
        server certvault-1:9100;
        server certvault-2:9100;
    }

    server {
        listen 443 ssl;
        server_name sso.gangdian.internal;
        ssl_certificate     /etc/nginx/certs/gangdian.crt;
        ssl_certificate_key /etc/nginx/certs/gangdian.key;
        add_header Strict-Transport-Security "max-age=31536000" always;
        client_max_body_size 1m;          # 与应用层 MAX_FORM_BYTES 量级一致

        location /login {
            limit_req zone=login_zone burst=3 nodelay;   # 网关侧登录限速
            proxy_pass http://idp_pool;
            include /etc/nginx/proxy_params;
        }

        location / {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://idp_pool;
            include /etc/nginx/proxy_params;
        }
    }

    server {
        listen 443 ssl;
        server_name cv.gangdian.internal;
        ssl_certificate     /etc/nginx/certs/gangdian.crt;
        ssl_certificate_key /etc/nginx/certs/gangdian.key;
        add_header Strict-Transport-Security "max-age=31536000" always;
        client_max_body_size 20m;         # 证件图上传上限(与应用层一致,06-E11)

        location / {
            proxy_pass http://certvault_pool;
            include /etc/nginx/proxy_params;
        }
    }
}
