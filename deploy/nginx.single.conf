# 港电统一平台 · 单机六系统 nginx 反代
# 六域名 → 六上游;HTTPS 强制(80 跳 443);登录口与 API 限速;
# 上传体积按系统区分(certvault 20m,余 1m)。证书见 deploy/gen_selfsigned_certs.sh。
# Copyright (c) 2026 厦门自贸片区港务电力有限公司(港电实验室)

worker_processes auto;
events { worker_connections 1024; }

http {
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=6r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/s;

    # 反代通用头(单文件内联,免额外挂载 proxy_params)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    upstream idp_up       { server idp:9000; }
    upstream certvault_up { server certvault:9100; }
    upstream nvr_up       { server nvr:9200; }
    upstream factory3d_up { server factory3d:9300; }
    upstream quiz_up      { server quiz:9400; }
    upstream adapter_up   { server adapter:8000; }

    # HTTP 全量跳 HTTPS(Secure Cookie 依赖)
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # 通用 TLS 片段以 map 复用较繁琐,单机直接每 server 重复声明证书路径。
    server {
        listen 443 ssl;
        server_name sso.gangdian.internal;
        ssl_certificate     /etc/nginx/certs/gangdian.crt;
        ssl_certificate_key /etc/nginx/certs/gangdian.key;
        add_header Strict-Transport-Security "max-age=31536000" always;
        client_max_body_size 1m;

        location /login {
            limit_req zone=login_zone burst=3 nodelay;
            proxy_pass http://idp_up;
        }
        location / {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://idp_up;
        }
    }

    server {
        listen 443 ssl;
        server_name cv.gangdian.internal;
        ssl_certificate     /etc/nginx/certs/gangdian.crt;
        ssl_certificate_key /etc/nginx/certs/gangdian.key;
        add_header Strict-Transport-Security "max-age=31536000" always;
        client_max_body_size 20m;         # 证件图上传上限(与应用层一致,06-E11)
        location / { proxy_pass http://certvault_up; }
    }

    server {
        listen 443 ssl;
        server_name nvr.gangdian.internal;
        ssl_certificate     /etc/nginx/certs/gangdian.crt;
        ssl_certificate_key /etc/nginx/certs/gangdian.key;
        add_header Strict-Transport-Security "max-age=31536000" always;
        client_max_body_size 1m;
        # nvr 推送设备走 TCP/HTTP 直连应用端口,不经此反代(见部署手册)
        location / { proxy_pass http://nvr_up; }
    }

    server {
        listen 443 ssl;
        server_name f3d.gangdian.internal;
        ssl_certificate     /etc/nginx/certs/gangdian.crt;
        ssl_certificate_key /etc/nginx/certs/gangdian.key;
        add_header Strict-Transport-Security "max-age=31536000" always;
        client_max_body_size 2m;
        # 三维大屏 WS 实时通道:升级头透传
        location / {
            proxy_pass http://factory3d_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }
    }

    server {
        listen 443 ssl;
        server_name quiz.gangdian.internal;
        ssl_certificate     /etc/nginx/certs/gangdian.crt;
        ssl_certificate_key /etc/nginx/certs/gangdian.key;
        add_header Strict-Transport-Security "max-age=31536000" always;
        client_max_body_size 1m;
        location / { proxy_pass http://quiz_up; }
    }

    server {
        listen 443 ssl;
        server_name adapter.gangdian.internal;
        ssl_certificate     /etc/nginx/certs/gangdian.crt;
        ssl_certificate_key /etc/nginx/certs/gangdian.key;
        add_header Strict-Transport-Security "max-age=31536000" always;
        client_max_body_size 1m;
        location / { proxy_pass http://adapter_up; }
    }
}
